<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Variable Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🧪 JS Variable Playground</h1>

    <textarea id="code" placeholder="Write your JS code here..."></textarea>

    <button onclick="runCode()">Run Code</button>

    <div class="output-box">
      <h3>Output:</h3>
      <pre id="output"></pre>
    </div>

    <div class="output-box">
      <h3>Explanation:</h3>
      <p id="explanation"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
